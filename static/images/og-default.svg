<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="630" stroke="white" stroke-width="1"/>
  </g>
  <!-- Logo area -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="120" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">AI</text>
  <text x="120" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle" dominant-baseline="middle">TOOLS</text>
  <!-- Site name -->
  <text x="180" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="white" dominant-baseline="middle">AI Tools Lab</text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">AIツールの専門レビューメディア</text>
  <text x="600" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,0.8)" text-anchor="middle" dominant-baseline="middle">最新のAIツール情報・比較・活用ガイド</text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="600" y="614" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle" dominant-baseline="middle">ai-tools-lab.pages.dev</text>
</svg>
