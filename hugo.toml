# 出力形式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# マークダウン設定
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Minify設定
[minify]
  disableXML = true
  minifyOutput = true
