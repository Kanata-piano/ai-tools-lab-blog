baseURL = "https://ai-tools-lab-blog.pages.dev/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "AI Tools Lab"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
hasCJKLanguage = true

[params]
  env = "production"
  description = "AIツールの専門レビュー＆活用ガイド。信頼できる情報で、最適なAIツール選びをサポートします。"
  author = "AI Tools Lab編集部"
  DateFormat = "2006年1月2日"

  # 記事表示設定
  ShowReadingTime = false
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  # テーマ設定
  defaultTheme = "auto"
  disableThemeToggle = false

  # 検索設定
  fuseOpts = { isCaseSensitive = false, shouldSort = true, location = 0, distance = 1000, threshold = 0.4, minMatchCharLength = 0, keys = ["title", "permalink", "summary", "content"] }

  # カバー画像設定
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true
    responsiveImages = true

  # OGP / ソーシャル設定
  images = ["/images/og-default.svg"]

  # ホームページ設定
  [params.homeInfoParams]
    Title = "👋 AI Tools Lab へようこそ！"
    Content = """最新AIツールを実際に使って、本音でレビュー。初心者でも分かる解説から、プロ向けの裏技まで。あなたのAIライフをもっと楽しく、もっと便利に。"""

  # SNSアイコン
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # ラベル（サイトロゴ）
  [params.label]
    text = "AI Tools Lab"
    icon = "/favicon.svg"
    iconHeight = 28

  # Google Analytics 4 (G-XXXXXXXXXXをユーザーのMeasurement IDに差し替え)
  # googleAnalytics = "G-XXXXXXXXXX"

  # 検出ツール（アナリティクス等は後で設定）
  # [params.analytics.google]
  #   SiteVerificationTag = ""

  # 広告設定（AdSense承認後に有効化）
  enableAds = false
  adSensePublisherId = ""  # ca-pub-xxxxxxxxxx

  # 編集リンク
  [params.editPost]
    disabled = true

# フッターメニュー（法的ページ）
