  weight = 20

[[menu.main]]
  identifier = "ai-video"
  name = "AI動画編集"
  url = "/categories/ai-video-editing/"
  weight = 30

[[menu.main]]
  identifier = "ai-business"
  name = "業務効率化"
  url = "/categories/ai-business-efficiency/"
  weight = 40

[[menu.main]]
  identifier = "ai-learning"
  name = "AI学習"
  url = "/categories/ai-learning-education/"
